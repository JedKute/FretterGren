<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - FretMaster</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #121212;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
      }
      .logo {
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        background: linear-gradient(135deg, #6200EE 0%, #03DAC5 100%);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
      }
      h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #6200EE 0%, #03DAC5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        font-size: 16px;
        color: #aaa;
        margin-bottom: 32px;
        max-width: 320px;
        line-height: 1.5;
      }
      .retry-btn {
        background: linear-gradient(135deg, #6200EE 0%, #03DAC5 100%);
        color: #fff;
        border: none;
        padding: 16px 32px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .retry-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(98, 0, 238, 0.4);
      }
      .retry-btn:active {
        transform: translateY(0);
      }
      .features {
        display: flex;
        gap: 16px;
        margin-top: 48px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .feature {
        background: #1E1E1E;
        border-radius: 16px;
        padding: 20px;
        width: 140px;
        border: 1px solid #333;
      }
      .feature-icon {
        font-size: 32px;
        margin-bottom: 8px;
      }
      .feature-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .feature-desc {
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="logo">🎸</div>
    <h1>FretMaster</h1>
    <p>You're currently offline. Some features may be limited, but you can still access cached lessons and practice sessions.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">📚</div>
        <div class="feature-title">Cached Lessons</div>
        <div class="feature-desc">Access downloaded content</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎸</div>
        <div class="feature-title">Practice Mode</div>
        <div class="feature-desc">Offline practice available</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-title">Progress</div>
        <div class="feature-desc">View local statistics</div>
      </div>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(function(registration) {
          registration.sync.register('sync-progress').catch(function() {});
        });
      }
    </script>
  </body>
</html>
